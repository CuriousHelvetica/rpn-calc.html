<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════════════╗
  ║  Helvetica RPN — iPhone 13 Pro PWA Calculator                       ║
  ║  Hosted on GitHub Pages. Add to Home Screen via Safari.             ║
  ╠══════════════════════════════════════════════════════════════════════╣
  ║  HARD-WON INSIGHTS — read before making any changes                 ║
  ╠══════════════════════════════════════════════════════════════════════╣
  ║                                                                      ║
  ║  1. LAYOUT APPROACH                                                  ║
  ║     The app always renders in landscape inside a portrait viewport.  ║
  ║     #shell is sized and rotated by layoutShell() in JS.             ║
  ║     Portrait:  shell width=VH, height=VW, rotate(90deg)             ║
  ║     Landscape: shell width=VW, height=VH, no rotation               ║
  ║     After rotate(90deg): shell LEFT=physical TOP (notch side)        ║
  ║                           shell RIGHT=physical BOTTOM (home bar)     ║
  ║                                                                      ║
  ║  2. DO NOT TOUCH layoutShell() or #shell CSS                        ║
  ║     This function was extremely hard to get right on iOS Safari.     ║
  ║     Do not change it, do not replace it with CSS vw/vh units,        ║
  ║     do not use window.screen.width (returns physical pixels).        ║
  ║     window.innerWidth/Height returns CSS pixels — always use those.  ║
  ║                                                                      ║
  ║  3. THEME SYSTEM                                                     ║
  ║     Dark mode = default, all colours hardcoded in base CSS.          ║
  ║     Light mode = .light class overrides ONLY, added on <body>.       ║
  ║     Never use CSS variables for theming — they caused layout bugs.   ║
  ║     Toggle button (☀/☾) sits in the display footer next to DEG.     ║
  ║                                                                      ║
  ║  4. PREVIEW IS A RELIABLE INDICATOR                                  ║
  ║     The Claude artifact preview accurately predicts phone rendering. ║
  ║     If the preview looks wrong, the phone will look wrong too.       ║
  ║     Do not upload to GitHub hoping it will look better on device.    ║
  ║                                                                      ║
  ║  5. iOS SAFARI QUIRKS                                                ║
  ║     - overflow:hidden on html/body clips position:fixed children.   ║
  ║       Use overflow:hidden on body only, not html.                    ║
  ║     - vh/vw CSS units are unreliable (URL bar affects vh).           ║
  ║       Always use JS innerWidth/innerHeight for sizing.               ║
  ║     - window.screen.width = physical pixels (3x on iPhone 13 Pro).  ║
  ║       Never use it for layout.                                       ║
  ║     - CSS transitions on layout properties can interfere with        ║
  ║       the rotation transform. Keep transition only on colour props.  ║
  ║                                                                      ║
  ║  6. STACK LOGIC — HP RPN liftEnabled flag                           ║
  ║     liftEnabled=true:  next digit lifts stack before entry           ║
  ║     liftEnabled=false: next digit REPLACES X (set by ENTER, CLx)    ║
  ║     Every binary/unary op sets liftEnabled=true after result.        ║
  ║     This replicates authentic HP 15C stack behaviour.               ║
  ║                                                                      ║
  ║  7. KEY LAYOUT — 10 cols × 4 rows                                   ║
  ║     Left block (cols 1-5): scientific functions                      ║
  ║     Col 6: CHS (row1), EEX (row2), ENTER spanning rows 3-4          ║
  ║     Cols 7-9: digits (7-9, 4-6, 1-3, 0/./000)                      ║
  ║     Col 10: operators (÷ × − +)                                     ║
  ║     Gold labels = f-shift, printed on body ABOVE button             ║
  ║     Blue labels = g-shift, printed on chamfer at bottom of button   ║
  ╚══════════════════════════════════════════════════════════════════════╝
-->

<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono:wght@400&family=Orbitron:wght@700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

html,body{
  width:100%;height:100%;
  background:#000;
  /* NO overflow:hidden here — it clips position:fixed children in WebKit */
  overflow:hidden;
  touch-action:none;
  -webkit-user-select:none;user-select:none;
}

/*
  #shell is always landscape-sized.
  JS sets its exact pixel width/height and transform on every resize/orientationchange.

  Portrait phone:   shell width=innerHeight, height=innerWidth, rotate(90deg)
  Landscape phone:  shell width=innerWidth,  height=innerHeight, rotate(0deg)

  Padding (in shell's own CSS coordinate space):
    padding-left  → physical TOP  (notch + status bar ≈ 62px)
    padding-right → physical BOTTOM (home indicator ≈ 34px, use 40px for comfort)
    padding-top/bottom → physical right/left edges (no safe areas needed)
*/
#shell{
  position:fixed;
  display:flex;
  flex-direction:row;
  align-items:stretch;
  background:#161616;
  gap:9px;

  /* Padding constants — safe for iPhone 13 Pro in portrait+rotated layout */
  padding-left:   62px;   /* physical top: notch(47) + status bar margin */
  padding-right:  40px;   /* physical bottom: home indicator(34) + 6px gap */
  padding-top:     6px;
  padding-bottom:  6px;

  /* width, height, top, left, transform all set by layoutShell() */
}

/* ── DISPLAY ── */

}

.fkey .kf{background:#1a1a1a;} .fkey .ml{color:#ffcc00;}

/* ── LIGHT THEME OVERRIDES ── */

<script>
// ═══════════════════════════════════════════
// LAYOUT — always show landscape regardless
// of how the device is held
// ═══════════════════════════════════════════
function layoutShell() {
  const shell = document.getElementById('shell');
  const VW = window.innerWidth;
  const VH = window.innerHeight;

  if (VH >= VW) {
    // Device is portrait (or square).
    // Rotate the shell 90deg clockwise so it appears landscape.
    // After rotate(90deg): CSS-left→physical-top, CSS-right→physical-bottom.
    // Shell CSS: width=VH (fills portrait height), height=VW (fills portrait width).
    const W = VH;  // shell CSS width  = portrait height (tall dimension)
    const H = VW;  // shell CSS height = portrait width  (narrow dimension)
    shell.style.width     = W + 'px';
    shell.style.height    = H + 'px';
    // Center the shell. With rotate(90deg) around the element's center,
    // we need the CSS center to sit at the viewport center (VW/2, VH/2).
    // CSS center = (left + W/2, top + H/2)
    // → left = VW/2 - W/2,  top = VH/2 - H/2
    shell.style.left      = (VW / 2 - W / 2) + 'px';  // negative
    shell.style.top       = (VH / 2 - H / 2) + 'px';  // positive
    shell.style.transform = 'rotate(90deg)';
  } else {
    // Device is landscape (iOS rotated the viewport to match phone rotation).
    // No extra rotation needed — just fill the landscape viewport directly.
    // CSS-left = physical-left (notch side), CSS-right = physical-right.
    shell.style.width     = VW + 'px';
    shell.style.height    = VH + 'px';
    shell.style.left      = '0px';
    shell.style.top       = '0px';
    shell.style.transform = 'none';
  }
}

// Run on load and on every resize / orientation change
window.addEventListener('resize',            () => setTimeout(layoutShell, 50));
window.addEventListener('orientationchange', () => setTimeout(layoutShell, 150));
layoutShell();

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
const SZ=8;
let stack=new Array(SZ).fill(0);
let inputStr='',isTyping=false;
let shiftMode=0;
let angleMode='DEG';
let memory=0,memUsed=false,lastX=0;
let liftEnabled=true;  // HP-style stack lift flag
const LBLS=['X','Y','Z','T','5','6','7','8'];
const REGS=['xreg','yreg','','','','','',''];

// ═══════════════════════════════════════════
// KEY TABLE
// ═══════════════════════════════════════════
const KEYS=[
  // ROW 1 — powers & logs
  {c:1, r:1, main:'x²',   gold:'√x',    blue:'',     fn:'sq',    fFn:'sqrt'                  },
  {c:2, r:1, main:'yˣ',   gold:'x√y',   blue:'%T',   fn:'yx',    fFn:'xrty',  gFn:'pctt'    },
  {c:3, r:1, main:'1/x',  gold:'',      blue:'',     fn:'recip'                              },
  {c:4, r:1, main:'LN',   gold:'eˣ',    blue:'%',    fn:'ln',    fFn:'expx',  gFn:'pct'     },
  {c:5, r:1, main:'LOG',  gold:'10ˣ',   blue:'Δ%',   fn:'log',   fFn:'pow10', gFn:'dpct'    },
  {c:6, r:1, main:'CHS',  gold:'INT',   blue:'FRAC', fn:'chs',   fFn:'intg',  gFn:'frac'    },
  {c:7, r:1, main:'7',    cls:'numk',   msz:'num',   fn:'d7'                                 },
  {c:8, r:1, main:'8',    cls:'numk',   msz:'num',   fn:'d8'                                 },
  {c:9, r:1, main:'9',    cls:'numk',   msz:'num',   fn:'d9'                                 },
  {c:10,r:1, main:'÷',    cls:'opk',    msz:'op',    fn:'div'                                },

  // ROW 2 — constants & trig
  {c:1, r:2, main:'π',    gold:'2π',    blue:'e',    fn:'pi',    fFn:'twopi', gFn:'euler'   },
  {c:2, r:2, main:'x!',   gold:'',      blue:'',     fn:'fact'                               },
  {c:3, r:2, main:'SIN',  gold:'SIN⁻¹', blue:'→R',   fn:'sin',   fFn:'asin',  gFn:'toRec'  },
  {c:4, r:2, main:'COS',  gold:'COS⁻¹', blue:'→P',   fn:'cos',   fFn:'acos',  gFn:'toPol'  },
  {c:5, r:2, main:'TAN',  gold:'TAN⁻¹', blue:'→H',   fn:'tan',   fFn:'atan',  gFn:'toHrs'  },
  {c:6, r:2, main:'EEX',  gold:'',      blue:'',     fn:'eex'                                },
  {c:7, r:2, main:'4',    cls:'numk',   msz:'num',   fn:'d4'                                 },
  {c:8, r:2, main:'5',    cls:'numk',   msz:'num',   fn:'d5'                                 },
  {c:9, r:2, main:'6',    cls:'numk',   msz:'num',   fn:'d6'                                 },
  {c:10,r:2, main:'×',    cls:'opk',    msz:'op',    fn:'mul'                                },

  // ROW 3 — stack ops
  {c:1, r:3, main:'%',    gold:'',      blue:'',     fn:'pct'                                },
  {c:2, r:3, main:'MOD',  gold:'ABS',   blue:'',     fn:'mod',   fFn:'abs'                  },
  {c:3, r:3, main:'R↓',   gold:'',      blue:'R↑',   fn:'rollDn',             gFn:'rollUp' },
  {c:4, r:3, main:'x⇄y',  gold:'RND',   blue:'INT',  fn:'swap',  fFn:'rnd',   gFn:'intg',  msz:'sm'},
  {c:5, r:3, main:'←',    gold:'CLR',   blue:'CLx',  fn:'bksp',  fFn:'clrAll',gFn:'clx'   },
  {c:6, r:3, rs:2, main:'ENTER', gold:'', blue:'LSTx', cls:'enter-k', msz:'ent', fn:'enter', gFn:'lastx'},
  {c:7, r:3, main:'1',    cls:'numk',   msz:'num',   fn:'d1'                                },
  {c:8, r:3, main:'2',    cls:'numk',   msz:'num',   fn:'d2'                                },
  {c:9, r:3, main:'3',    cls:'numk',   msz:'num',   fn:'d3'                                },
  {c:10,r:3, main:'−',    cls:'opk',    msz:'op',    fn:'sub'                               },

  // ROW 4 — control
  {c:1, r:4, main:'CL\nALL', gold:'', blue:'', cls:'clall-k', msz:'cl', fn:'clrAll'          },
  {c:2, r:4, main:'f',    gold:'',      blue:'',     cls:'fkey',  fn:'shiftF'               },
  {c:3, r:4, main:'g',    gold:'',      blue:'',     cls:'gkey',  fn:'shiftG'               },
  {c:4, r:4, main:'STO',  gold:'',      blue:'',     fn:'sto',                 msz:'sm'     },
  {c:5, r:4, main:'RCL',  gold:'',      blue:'',     fn:'rcl',                 msz:'sm'     },
  // col 6 = ENTER span
  {c:7, r:4, main:'0',    cls:'numk',   msz:'num',   fn:'d0'                                },
  {c:8, r:4, main:'·',    cls:'numk',   msz:'num',   fn:'dot'                               },
  {c:9, r:4, main:'000',  gold:'/000',  blue:'',     fn:'d000',  fFn:'div1000', msz:'sm'   },
  {c:10,r:4, main:'+',    cls:'opk',    msz:'op',    fn:'add'                               },
];

// ═══════════════════════════════════════════
// BUILD
// ═══════════════════════════════════════════
function buildKeypad(){
  const kp=document.getElementById('kp');
  KEYS.forEach(k=>{
    const cell=document.createElement('div');
    cell.className='cell '+(k.cls||'');
    cell.style.gridColumn=String(k.c);
    cell.style.gridRow=k.rs?`${k.r}/span ${k.rs}`:String(k.r);

    const above=document.createElement('div');
    above.className='above';above.textContent=k.gold||'';
    cell.appendChild(above);

    const btn=document.createElement('div');
    btn.className='k';
    if(k.cls&&k.cls.includes('fkey'))btn.dataset.sk='f';
    if(k.cls&&k.cls.includes('gkey'))btn.dataset.sk='g';

    const face=document.createElement('div');face.className='kf';
    const ml=document.createElement('span');
    ml.className='ml'+(k.msz?' '+k.msz:'');
    if(k.main.includes('\n'))ml.style.whiteSpace='pre-line';
    ml.textContent=k.main;
    face.appendChild(ml);btn.appendChild(face);

    const cham=document.createElement('div');cham.className='kc';
    if(k.blue){
      const cl=document.createElement('span');
      cl.className='cl-lbl';cl.textContent=k.blue;cham.appendChild(cl);
    }
    btn.appendChild(cham);
    btn.addEventListener('pointerdown',e=>{e.preventDefault();playSoftTap();handleKey(k);});
    cell.appendChild(btn);kp.appendChild(cell);
  });
}

// ═══════════════════════════════════════════
// FORMAT — thousands commas
// ═══════════════════════════════════════════
function fmt(n){
  if(!isFinite(n))return isNaN(n)?'NaN':(n>0?'+∞':'−∞');
  const a=Math.abs(n);
  if(a!==0&&(a>=1e13||a<1e-6))
    return n.toExponential(5).replace('e+','e').replace('e-','e−');
  let s=parseFloat(n.toPrecision(10)).toString();
  const dot=s.indexOf('.');
  const intP=dot>=0?s.slice(0,dot):s;
  const decP=dot>=0?s.slice(dot):'';
  const sign=intP.startsWith('-')?'-':'';
  const d=intP.replace(/^-/,'');
  return sign+d.replace(/\B(?=(\d{3})+(?!\d))/g,',')+decP;
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render(){
  const area=document.getElementById('stackRows');
  area.innerHTML='';
  for(let i=SZ-1;i>=0;i--){
    const row=document.createElement('div');
    row.className='srow'+(REGS[i]?' '+REGS[i]:'');
    const lbl=document.createElement('span');lbl.className='slbl';lbl.textContent=LBLS[i];
    const val=document.createElement('span');val.className='sval';
    val.textContent=(i===0&&isTyping)?(inputStr||'0'):fmt(stack[i]);
    row.appendChild(lbl);row.appendChild(val);area.appendChild(row);
  }
  document.getElementById('annF').className='ind ind-f'+(shiftMode===1?' on':'');
  document.getElementById('annG').className='ind ind-g'+(shiftMode===2?' on':'');
  document.getElementById('annM').className='ind ind-m'+(memUsed?' on':'');
  document.getElementById('angBtn').textContent=angleMode;
  // Aux registers
  document.getElementById('auxMem').textContent  = memUsed ? fmt(memory) : '—';
  document.getElementById('auxLast').textContent = lastX!==0 ? fmt(lastX) : '—';
  document.querySelectorAll('[data-sk]').forEach(b=>{
    b.classList.remove('slit');
    if(shiftMode===1&&b.dataset.sk==='f')b.classList.add('slit');
    if(shiftMode===2&&b.dataset.sk==='g')b.classList.add('slit');
  });
}

function showErr(m){const e=document.getElementById('errLine');e.textContent=m;setTimeout(()=>e.textContent='',2500);}
function clearErr(){document.getElementById('errLine').textContent='';}

// ═══════════════════════════════════════════
// STACK
// ═══════════════════════════════════════════
function lift(){for(let i=SZ-1;i>0;i--)stack[i]=stack[i-1];}
function drop(){for(let i=0;i<SZ-1;i++)stack[i]=stack[i+1];}
function pushX(v){lift();stack[0]=v;}
function saveLast(){lastX=stack[0];}
function commit(){
  if(!isTyping)return;
  const v=parseFloat(inputStr);stack[0]=isNaN(v)?0:v;
  isTyping=false;inputStr='';
}
function dgt(d){
  if(!isTyping){
    if(liftEnabled) lift();   // only lift if flag is set
    inputStr=''; isTyping=true;
    liftEnabled=true;         // re-enable for any subsequent new entry
  }
  inputStr+=d;
}
function startEntry(){
  // shared setup for dot and eex when not already typing
  if(liftEnabled) lift();
  liftEnabled=true;
}
function toRad(x){return angleMode==='DEG'?x*Math.PI/180:x;}
function fromRad(x){return angleMode==='DEG'?x*180/Math.PI:x;}
function toggleAngle(){angleMode=angleMode==='DEG'?'RAD':'DEG';render();}
let isLight=false;
function toggleTheme(){
  isLight=!isLight;
  document.body.classList.toggle('light',isLight);
  document.getElementById('themeBtn').textContent=isLight?'☾':'☀';
}

// ═══════════════════════════════════════════
// AUDIO — soft tap (Web Audio, no files)
// ═══════════════════════════════════════════
let isSoundOn=false;
let audioCtx=null;
let audioReady=false;

function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  // Play a silent buffer to unlock iOS audio on first gesture
  const buf=audioCtx.createBuffer(1,1,audioCtx.sampleRate);
  const src=audioCtx.createBufferSource();
  src.buffer=buf;src.connect(audioCtx.destination);src.start();
  audioReady=true;
}

function playSoftTap(){
  if(!isSoundOn||!audioCtx)return;
  const a=audioCtx;
  const t=a.currentTime;

  // High-freq clack layer
  const len=Math.floor(a.sampleRate*0.018);
  const buf=a.createBuffer(1,len,a.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,10);
  const src=a.createBufferSource();src.buffer=buf;
  const mid=a.createBiquadFilter();mid.type='peaking';mid.frequency.value=1800;mid.gain.value=12;
  const hi=a.createBiquadFilter();hi.type='highpass';hi.frequency.value=5000;
  const hg=a.createGain();hg.gain.setValueAtTime(0.13,t);
  src.connect(mid);mid.connect(hi);hi.connect(hg);hg.connect(a.destination);
  src.start(t);

  // Deep sub thump (D2: 60Hz→20Hz, 80ms)
  const osc=a.createOscillator();
  osc.type='sine';
  osc.frequency.setValueAtTime(60,t);
  osc.frequency.exponentialRampToValueAtTime(20,t+0.08);
  const sg=a.createGain();
  sg.gain.setValueAtTime(0.17,t);
  sg.gain.exponentialRampToValueAtTime(0.001,t+0.08);
  osc.connect(sg);sg.connect(a.destination);
  osc.start(t);osc.stop(t+0.08);
}

function toggleSound(){
  if(!isSoundOn){initAudio();}  // warm up context on first enable
  isSoundOn=!isSoundOn;
  document.getElementById('soundBtn').classList.toggle('on',isSoundOn);
}

// ═══════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════
const A={
  shiftF(){shiftMode=shiftMode===1?0:1;},
  shiftG(){shiftMode=shiftMode===2?0:2;},
  d0(){dgt('0');},d1(){dgt('1');},d2(){dgt('2');},d3(){dgt('3');},d4(){dgt('4');},
  d5(){dgt('5');},d6(){dgt('6');},d7(){dgt('7');},d8(){dgt('8');},d9(){dgt('9');},
  dot(){if(!isTyping){startEntry();inputStr='0';isTyping=true;}if(!inputStr.includes('.'))inputStr+='.';},
  eex(){if(!isTyping){startEntry();inputStr='1';isTyping=true;}if(!inputStr.includes('e'))inputStr+='e';},
  chs(){if(isTyping){inputStr=inputStr.startsWith('-')?inputStr.slice(1):'-'+inputStr;}else stack[0]=-stack[0];},
  pi(){pushX(Math.PI); liftEnabled=true;},
  twopi(){pushX(2*Math.PI); liftEnabled=true;},
  euler(){pushX(Math.E); liftEnabled=true;},
  d000(){
    // append three zeros to current entry, or push 0 if stack is idle
    if(!isTyping){ lift(); inputStr='0'; isTyping=true; liftEnabled=true; }
    // only append if it won't overflow display (cap at 13 digits)
    const digits=(inputStr.replace(/[^0-9]/g,'')).length;
    if(digits+3<=13) inputStr+='000';
  },
  div1000(){ U(x=>x/1000); },
  // ENTER: lift stack, duplicate X, then DISABLE lift so next digit replaces X
  enter(){commit();const x=stack[0];lift();stack[0]=x; liftEnabled=false;},
  rollDn(){commit();const x=stack[0];drop();stack[SZ-1]=x; liftEnabled=true;},
  rollUp(){commit();const t=stack[SZ-1];for(let i=SZ-1;i>0;i--)stack[i]=stack[i-1];stack[0]=t; liftEnabled=true;},
  swap(){commit();[stack[0],stack[1]]=[stack[1],stack[0]]; liftEnabled=true;},
  clx(){commit();stack[0]=0; liftEnabled=false;},  // CLx: next digit replaces X
  bksp(){
    if(isTyping){inputStr=inputStr.slice(0,-1);if(!inputStr||inputStr==='-'){inputStr='';isTyping=false;stack[0]=0;}}
    else drop();
  },
  clrAll(){stack.fill(0);memory=0;memUsed=false;lastX=0;inputStr='';isTyping=false;liftEnabled=true;},
  lastx(){pushX(lastX); liftEnabled=true;},
  add(){B((y,x)=>y+x);},sub(){B((y,x)=>y-x);},mul(){B((y,x)=>y*x);},
  div(){B((y,x)=>{if(x===0){showErr('DIV BY 0');return NaN;}return y/x;});},
  mod(){B((y,x)=>{if(x===0){showErr('DIV BY 0');return NaN;}return y%x;});},
  pct(){commit();saveLast();stack[0]=stack[1]*stack[0]/100; liftEnabled=true;},
  dpct(){B((y,x)=>{if(y===0){showErr('DIV BY 0');return NaN;}return(x-y)/y*100;});},
  pctt(){B((y,x)=>{if(y===0){showErr('DIV BY 0');return NaN;}return x/y*100;});},
  sqrt(){U(x=>{if(x<0){showErr('DOMAIN');return NaN;}return Math.sqrt(x);});},
  sq(){U(x=>x*x);},cbrt(){U(x=>Math.cbrt(x));},
  expx(){U(x=>Math.exp(x));},
  ln(){U(x=>{if(x<=0){showErr('DOMAIN');return NaN;}return Math.log(x);});},
  pow10(){U(x=>Math.pow(10,x));},
  log(){U(x=>{if(x<=0){showErr('DOMAIN');return NaN;}return Math.log10(x);});},
  yx(){B((y,x)=>Math.pow(y,x));},
  xrty(){B((y,x)=>{if(x===0){showErr('DIV BY 0');return NaN;}return Math.pow(y,1/x);});},
  recip(){U(x=>{if(x===0){showErr('DIV BY 0');return NaN;}return 1/x;});},
  fact(){U(x=>{if(x<0||x!==Math.floor(x)){showErr('DOMAIN');return NaN;}if(x>170){showErr('OVERFLOW');return Infinity;}let r=1;for(let i=2;i<=x;i++)r*=i;return r;});},
  abs(){U(x=>Math.abs(x));},intg(){U(x=>Math.trunc(x));},frac(){U(x=>x-Math.trunc(x));},
  rnd(){U(x=>parseFloat(x.toPrecision(6)));},
  sin(){U(x=>Math.sin(toRad(x)));},cos(){U(x=>Math.cos(toRad(x)));},tan(){U(x=>Math.tan(toRad(x)));},
  asin(){U(x=>{if(Math.abs(x)>1){showErr('DOMAIN');return NaN;}return fromRad(Math.asin(x));});},
  acos(){U(x=>{if(Math.abs(x)>1){showErr('DOMAIN');return NaN;}return fromRad(Math.acos(x));});},
  atan(){U(x=>fromRad(Math.atan(x)));},
  toRec(){commit();saveLast();const th=toRad(stack[0]),r=stack[1];stack[0]=r*Math.cos(th);stack[1]=r*Math.sin(th);},
  toPol(){commit();saveLast();const y=stack[0],x=stack[1];stack[0]=fromRad(Math.atan2(y,x));stack[1]=Math.sqrt(x*x+y*y);},
  toHrs(){U(x=>{const h=Math.trunc(x);const rem=(x-h)*100;const m=Math.trunc(rem);const s=(rem-m)*100;return h+m/60+s/3600;});},
  sto(){commit();memory=stack[0];memUsed=true; liftEnabled=true;},
  rcl(){commit();pushX(memory); liftEnabled=true;},
};
function B(fn){commit();saveLast();const x=stack[0],y=stack[1];const r=fn(y,x);if(r!==undefined&&!isNaN(r)){drop();stack[0]=r;} liftEnabled=true;}
function U(fn){commit();saveLast();const r=fn(stack[0]);if(r!==undefined&&!isNaN(r))stack[0]=r; liftEnabled=true;}

function handleKey(k){
  clearErr();
  const isShift=(k.fn==='shiftF'||k.fn==='shiftG');
  let fn;
  if(shiftMode===1&&!isShift){fn=k.fFn||k.fn;shiftMode=0;}
  else if(shiftMode===2&&!isShift){fn=k.gFn||k.fn;shiftMode=0;}
  else fn=k.fn;
  if(fn&&A[fn])A[fn]();
  render();
}

// Keyboard (desktop testing)
document.addEventListener('keydown',e=>{
  const map={Enter:'enter',Backspace:'bksp',Escape:'clrAll',
    '+':'add','-':'sub','*':'mul','/':'div',
    '0':'d0','1':'d1','2':'d2','3':'d3','4':'d4',
    '5':'d5','6':'d6','7':'d7','8':'d8','9':'d9',
    '.':'dot','e':'eex','E':'eex','s':'sin','c':'cos',
    't':'tan','l':'ln','L':'log','p':'pi','q':'sqrt',
    'r':'rollDn','x':'swap','n':'chs','a':'abs',};
  if(map[e.key]){e.preventDefault();clearErr();if(A[map[e.key]]){A[map[e.key]]();render();}}
});

buildKeypad();
render();
</script>
