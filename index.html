<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HP-15C">
<title>HP-15C RPN</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

html,body{
  width:100%;height:100%;
  background:#000;
  overflow:hidden;
  font-family:'Share Tech Mono',monospace;
  touch-action:manipulation;
  -webkit-user-select:none;user-select:none;
}

.portrait-warn{
  display:none;position:fixed;inset:0;
  background:#000;color:#aaa;
  font-family:'Share Tech Mono',monospace;font-size:15px;
  align-items:center;justify-content:center;
  flex-direction:column;gap:14px;z-index:999;letter-spacing:2px;
}
.portrait-warn .arrow{font-size:52px;}

@media(orientation:portrait){
  .portrait-warn{display:flex;}
  .calc-wrap{display:none!important;}
}

.calc-wrap{
  display:flex;flex-direction:row;
  width:100vw;height:100vh;
  background:#111;
  padding:env(safe-area-inset-top,2px) env(safe-area-inset-right,6px)
           env(safe-area-inset-bottom,2px) env(safe-area-inset-left,6px);
  gap:7px;align-items:stretch;
}

/* ── DISPLAY ── */
.disp{
  width:178px;flex-shrink:0;
  background:#040904;
  border-radius:8px;border:1px solid #152010;
  box-shadow:inset 0 2px 20px #000,0 0 22px rgba(120,200,60,0.09);
  display:flex;flex-direction:column;
  padding:7px 10px 5px;gap:0;
}
.disp-top{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;
}
.hp-brand{
  font-family:'Orbitron',monospace;font-size:10px;font-weight:700;
  color:#3a5825;letter-spacing:3px;
}
.shift-badge{
  font-size:12px;font-weight:bold;letter-spacing:1px;
  padding:1px 7px;border-radius:4px;border:1px solid transparent;
  min-width:26px;text-align:center;transition:all 0.1s;
}
.shift-badge.none{color:#1e2e18;border-color:transparent;}
.shift-badge.f   {color:#ffcc00;border-color:#ffcc00;background:rgba(255,204,0,0.13);}
.shift-badge.g   {color:#44ccff;border-color:#44ccff;background:rgba(68,204,255,0.13);}

.stack-rows{flex:1;display:flex;flex-direction:column;justify-content:flex-end;gap:2px;}

.sr{display:flex;justify-content:space-between;align-items:baseline;padding:1px 0;}
.sr-lbl{font-size:9px;color:#253818;width:16px;flex-shrink:0;letter-spacing:.5px;}
.sr-val{font-size:11px;color:#345224;text-align:right;flex:1;
        white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sr.xreg .sr-lbl{color:#88dd44;font-size:10px;}
.sr.xreg .sr-val{color:#ccff66;font-size:17px;font-weight:bold;}

.disp-footer{
  margin-top:5px;padding-top:4px;
  border-top:1px solid #0c180a;
  display:flex;justify-content:space-between;align-items:center;
}
.anns{display:flex;gap:5px;}
.ann{font-size:8px;color:#182210;letter-spacing:.5px;transition:color 0.1s;}
.ann.on {color:#88dd44;}
.ann.fon{color:#ffcc00;}
.ann.gon{color:#44ccff;}

.ang-btn{
  font-size:9px;color:#3a5020;
  border:1px solid #253818;border-radius:3px;
  padding:1px 6px;cursor:pointer;letter-spacing:1px;
  -webkit-tap-highlight-color:transparent;
}
.ang-btn:active{color:#ccff66;border-color:#88dd44;}
.err-line{font-size:9px;color:#ff5050;min-height:12px;text-align:right;margin-top:3px;letter-spacing:1px;}

/* ── KEYPAD: 9 cols × 5 rows ── */
.keypad{
  flex:1;
  display:grid;
  grid-template-columns:repeat(9,1fr);
  grid-template-rows:repeat(5,1fr);
  gap:5px;padding:3px 0;
}

/* ── BASE KEY ── */
.k{
  position:relative;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  border-radius:6px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  user-select:none;
  transition:filter .06s,transform .05s;
  overflow:visible;
  padding-bottom:11px;
  /* default: dark grey */
  background:linear-gradient(175deg,#3e3e3e,#282828);
  border:1px solid #565656;
  box-shadow:0 3px 0 #080808,inset 0 1px 0 rgba(255,255,255,0.1);
}
.k:active{transform:translateY(2px);box-shadow:0 1px 0 #000;filter:brightness(1.4);}

.k .ml{
  font-family:'Share Tech Mono',monospace;
  font-size:13px;color:#fff;
  text-align:center;line-height:1;letter-spacing:.3px;white-space:nowrap;
}
.k .ml.sm{font-size:10px;}
.k .ml.xs{font-size:9px;}

/* f/g shift labels */
.k .fl{position:absolute;bottom:2px;left:3px;font-size:7.5px;color:#ffcc00;line-height:1;white-space:nowrap;}
.k .gl{position:absolute;bottom:2px;right:3px;font-size:7.5px;color:#44ccff;line-height:1;white-space:nowrap;}

/* ── KEY VARIANTS ── */
.k.num{
  background:linear-gradient(175deg,#484848,#303030);
  border-color:#686868;
}
.k.num .ml{font-size:18px;font-weight:bold;color:#fff;}

.k.op{
  background:linear-gradient(175deg,#3c2828,#281818);
  border-color:#664040;
}
.k.op .ml{font-size:18px;color:#ffbbbb;font-weight:bold;}

.k.enter-k{
  background:linear-gradient(175deg,#1e301e,#111e11);
  border-color:3a583a;
  padding-bottom:0;
}
.k.enter-k .ml{font-size:12px;color:#aaffaa;letter-spacing:2px;}

.k.fkey{
  background:linear-gradient(175deg,#4e3c00,#342800);
  border-color:#887000;
}
.k.fkey .ml{color:#ffcc00;font-size:12px;font-weight:bold;letter-spacing:2px;}

.k.gkey{
  background:linear-gradient(175deg,#00223c,#001428);
  border-color:#005080;
}
.k.gkey .ml{color:#44ccff;font-size:12px;font-weight:bold;letter-spacing:2px;}

.k.stk{
  background:linear-gradient(175deg,#2c2c40,#181824);
  border-color:424260;
}
.k.stk .ml{color:#aaaaee;font-size:11px;}

.k.clr{
  background:linear-gradient(175deg,#3c1c1c,#260e0e);
  border-color:#662424;
}
.k.clr .ml{color:#ff7070;font-size:13px;}

.k.mem{
  background:linear-gradient(175deg,#303018,#1e1e0c);
  border-color:565620;
}
.k.mem .ml{color:#dddd88;font-size:11px;}

.k.f-lit{
  background:linear-gradient(175deg,#5e4800,#3c2e00)!important;
  border-color:#ffcc00!important;
  box-shadow:0 0 12px rgba(255,204,0,.55),0 3px 0 #000!important;
}
.k.g-lit{
  background:linear-gradient(175deg,#003050,#001830)!important;
  border-color:#44ccff!important;
  box-shadow:0 0 12px rgba(68,204,255,.55),0 3px 0 #000!important;
}
.k.ghost{background:transparent;border:none;box-shadow:none;pointer-events:none;}
</style>
</head>
<body>

<div class="portrait-warn">
  <div class="arrow">↻</div>
  <div>ROTATE TO LANDSCAPE</div>
</div>

<div class="calc-wrap">

  <!-- DISPLAY -->
  <div class="disp">
    <div class="disp-top">
      <span class="hp-brand">HP·15C</span>
      <span class="shift-badge none" id="shiftBadge">—</span>
    </div>
    <div class="stack-rows" id="stackRows"></div>
    <div class="disp-footer">
      <div class="anns">
        <span class="ann" id="annF">f</span>
        <span class="ann" id="annG">g</span>
        <span class="ann" id="annM">M</span>
      </div>
      <span class="ang-btn" id="angBtn" onclick="toggleAngle()">DEG</span>
    </div>
    <div class="err-line" id="errLine"></div>
  </div>

  <!-- KEYPAD 9×5 -->
  <div class="keypad" id="keypad"></div>

</div>

<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
const SZ=8;
let stack=new Array(SZ).fill(0);
let inputStr='',isTyping=false;
let shiftMode=0; // 0 none, 1 f, 2 g
let angleMode='DEG';
let memory=0,memUsed=false,lastX=0;
const LBLS=['X','Y','Z','T','5','6','7','8'];

// ═══════════════════════════════════════
// KEY TABLE
// col 1-9, row 1-5
// ENTER: col 8, row 1, rowspan 2
//
// Layout:
//  Col:  1      2      3      4      5      6    7    8        9
//  R1: [√x]  [e^x] [10^x]  [y^x]  [1/x]  [CHS][EEX][ENTER]  [÷]
//  R2: [STO]  [RCL]  [R↓]  [X⇄Y]  [⌫]   [ 7 ][ 8 ][ ↑↑  ]  [×]
//  R3: [SIN]  [COS]  [TAN]  [LOG]  [LN]  [ 4 ][ 5 ][ 6  ]   [−]
//  R4: [ f ]  [ g ]  [ π ]  [x!]  [ABS]  [ 1 ][ 2 ][ 3  ]   [+]
//  R5: [LSTx] [RND] [INT] [FRAC]  [MOD]  [ 0 ][ · ][    ]   [ ]
// ═══════════════════════════════════════
const KEYS=[
  // Row 1
  {c:1,r:1,ml:'√x',   cls:'',      fn:'sqrt',  fFn:'sq',    gFn:'lastx', fl:'x²',  gl:'LSTx'},
  {c:2,r:1,ml:'eˣ',   cls:'',      fn:'expx',  fFn:'ln',    gFn:'pct',   fl:'LN',  gl:'%'   },
  {c:3,r:1,ml:'10ˣ',  cls:'',      fn:'pow10', fFn:'log',   gFn:'dpct',  fl:'LOG', gl:'Δ%'  },
  {c:4,r:1,ml:'yˣ',   cls:'',      fn:'yx',    fFn:'xrty',               fl:'x√y'            },
  {c:5,r:1,ml:'1/x',  cls:'',      fn:'recip', fFn:'fact',  gFn:'abs',   fl:'x!',  gl:'ABS' },
  {c:6,r:1,ml:'CHS',  cls:'',      fn:'chs',   fFn:'intg',  gFn:'frac',  fl:'INT', gl:'FRAC'},
  {c:7,r:1,ml:'EEX',  cls:'',      fn:'eex',   fFn:'pi',                 fl:'π'              },
  {c:8,r:1,ml:'ENTER',cls:'enter-k',fn:'enter',rs:2                                          },
  {c:9,r:1,ml:'÷',    cls:'op',    fn:'div'                                                  },
  // Row 2
  {c:1,r:2,ml:'STO',  cls:'mem',   fn:'sto',   fFn:'mplus', gFn:'mminus',fl:'M+',  gl:'M−'  },
  {c:2,r:2,ml:'RCL',  cls:'mem',   fn:'rcl'                                                  },
  {c:3,r:2,ml:'R↓',   cls:'stk',   fn:'rollDn',fFn:'rollUp',             fl:'R↑'             },
  {c:4,r:2,ml:'X⇄Y', cls:'stk',   fn:'swap',  fFn:'clx',                fl:'CLx'            },
  {c:5,r:2,ml:'⌫',    cls:'clr',   fn:'bksp',  fFn:'clearAll',           fl:'CLR'            },
  {c:6,r:2,ml:'7',    cls:'num',   fn:'d7'                                                   },
  {c:7,r:2,ml:'8',    cls:'num',   fn:'d8'                                                   },
  // col 8 row 2: ENTER span — skip
  {c:9,r:2,ml:'×',    cls:'op',    fn:'mul'                                                  },
  // Row 3
  {c:1,r:3,ml:'SIN',  cls:'',      fn:'sin',   fFn:'asin',               fl:'A⁻¹'            },
  {c:2,r:3,ml:'COS',  cls:'',      fn:'cos',   fFn:'acos',               fl:'A⁻¹'            },
  {c:3,r:3,ml:'TAN',  cls:'',      fn:'tan',   fFn:'atan',               fl:'A⁻¹'            },
  {c:4,r:3,ml:'LOG',  cls:'',      fn:'log',   fFn:'pow10',              fl:'10ˣ'            },
  {c:5,r:3,ml:'LN',   cls:'',      fn:'ln',    fFn:'expx',               fl:'eˣ'             },
  {c:6,r:3,ml:'4',    cls:'num',   fn:'d4'                                                   },
  {c:7,r:3,ml:'5',    cls:'num',   fn:'d5'                                                   },
  {c:8,r:3,ml:'6',    cls:'num',   fn:'d6'                                                   },
  {c:9,r:3,ml:'−',    cls:'op',    fn:'sub'                                                  },
  // Row 4
  {c:1,r:4,ml:'f',    cls:'fkey',  fn:'shiftF'                                               },
  {c:2,r:4,ml:'g',    cls:'gkey',  fn:'shiftG'                                               },
  {c:3,r:4,ml:'π',    cls:'',      fn:'pi'                                                   },
  {c:4,r:4,ml:'x!',   cls:'',      fn:'fact',  fFn:'rnd',   gFn:'intg',  fl:'RND', gl:'INT' },
  {c:5,r:4,ml:'ABS',  cls:'',      fn:'abs',   fFn:'frac',  gFn:'lastx', fl:'FRAC',gl:'LSTx'},
  {c:6,r:4,ml:'1',    cls:'num',   fn:'d1'                                                   },
  {c:7,r:4,ml:'2',    cls:'num',   fn:'d2'                                                   },
  {c:8,r:4,ml:'3',    cls:'num',   fn:'d3'                                                   },
  {c:9,r:4,ml:'+',    cls:'op',    fn:'add'                                                  },
  // Row 5
  {c:1,r:5,ml:'LSTx', cls:'stk',   fn:'lastx'                                                },
  {c:2,r:5,ml:'RND',  cls:'',      fn:'rnd'                                                  },
  {c:3,r:5,ml:'INT',  cls:'',      fn:'intg'                                                 },
  {c:4,r:5,ml:'FRAC', cls:'',      fn:'frac'                                                 },
  {c:5,r:5,ml:'MOD',  cls:'op',    fn:'mod'                                                  },
  {c:6,r:5,ml:'0',    cls:'num',   fn:'d0'                                                   },
  {c:7,r:5,ml:'·',    cls:'num',   fn:'dot'                                                  },
  {c:8,r:5,ml:'',     cls:'ghost', fn:null                                                   },
  {c:9,r:5,ml:'',     cls:'ghost', fn:null                                                   },
];

// ═══════════════════════════════════════
// BUILD
// ═══════════════════════════════════════
function build(){
  const kp=document.getElementById('keypad');
  KEYS.forEach(k=>{
    const btn=document.createElement('button');
    btn.className='k '+(k.cls||'');
    if(k.fn) btn.setAttribute('data-fn',k.fn);
    btn.style.gridColumn=String(k.c);
    btn.style.gridRow=k.rs?`${k.r}/span ${k.rs}`:String(k.r);

    if(k.cls!=='ghost'){
      const len=(k.ml||'').length;
      const ml=document.createElement('span');
      ml.className='ml'+(len>4?' sm':'')+(len>6?' xs':'');
      ml.textContent=k.ml||'';
      btn.appendChild(ml);
      if(k.fl){const e=document.createElement('span');e.className='fl';e.textContent=k.fl;btn.appendChild(e);}
      if(k.gl){const e=document.createElement('span');e.className='gl';e.textContent=k.gl;btn.appendChild(e);}
      btn.addEventListener('pointerdown',e=>{e.preventDefault();handleKey(k);});
    }
    kp.appendChild(btn);
  });
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function fmt(n){
  if(!isFinite(n)) return isNaN(n)?'NaN':(n>0?'+∞':'−∞');
  const a=Math.abs(n);
  if(a!==0&&(a>=1e10||a<1e-7)) return n.toExponential(5).replace('e+','e').replace('e-','e−');
  return parseFloat(n.toPrecision(10)).toString();
}

function render(){
  const area=document.getElementById('stackRows');
  area.innerHTML='';
  for(let i=SZ-1;i>=0;i--){
    const row=document.createElement('div');
    row.className='sr'+(i===0?' xreg':'');
    const lbl=document.createElement('span');lbl.className='sr-lbl';lbl.textContent=LBLS[i];
    const val=document.createElement('span');val.className='sr-val';
    val.textContent=(i===0&&isTyping)?(inputStr||'0'):fmt(stack[i]);
    row.appendChild(lbl);row.appendChild(val);area.appendChild(row);
  }
  // shift badge
  const sb=document.getElementById('shiftBadge');
  if(shiftMode===1){sb.textContent='f';sb.className='shift-badge f';}
  else if(shiftMode===2){sb.textContent='g';sb.className='shift-badge g';}
  else{sb.textContent='—';sb.className='shift-badge none';}
  // annunciators
  document.getElementById('annF').className='ann'+(shiftMode===1?' fon':'');
  document.getElementById('annG').className='ann'+(shiftMode===2?' gon':'');
  document.getElementById('annM').className='ann'+(memUsed?' on':'');
  // angle
  document.getElementById('angBtn').textContent=angleMode;
  // shift glow
  document.querySelectorAll('.k').forEach(b=>{b.classList.remove('f-lit','g-lit');});
  if(shiftMode===1) document.querySelectorAll('[data-fn="shiftF"]').forEach(b=>b.classList.add('f-lit'));
  if(shiftMode===2) document.querySelectorAll('[data-fn="shiftG"]').forEach(b=>b.classList.add('g-lit'));
}

function showErr(m){
  const el=document.getElementById('errLine');el.textContent=m;
  setTimeout(()=>el.textContent='',2500);
}
function clearErr(){document.getElementById('errLine').textContent='';}

// ═══════════════════════════════════════
// STACK
// ═══════════════════════════════════════
function lift(){for(let i=SZ-1;i>0;i--) stack[i]=stack[i-1];}
function drop(){for(let i=0;i<SZ-1;i++) stack[i]=stack[i+1];}
function pushX(v){lift();stack[0]=v;}
function saveLast(){lastX=stack[0];}
function commit(){
  if(!isTyping)return;
  const v=parseFloat(inputStr);
  stack[0]=isNaN(v)?0:v;
  isTyping=false;inputStr='';
}
function dgt(d){
  if(!isTyping){lift();inputStr='';isTyping=true;}
  inputStr+=d;
}
function toRad(x){return angleMode==='DEG'?x*Math.PI/180:x;}
function fromRad(x){return angleMode==='DEG'?x*180/Math.PI:x;}
function toggleAngle(){angleMode=angleMode==='DEG'?'RAD':'DEG';render();}

// ═══════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════
const A={
  shiftF(){shiftMode=shiftMode===1?0:1;},
  shiftG(){shiftMode=shiftMode===2?0:2;},
  d0(){dgt('0');},'d1'(){dgt('1');},'d2'(){dgt('2');},'d3'(){dgt('3');},'d4'(){dgt('4');},
  d5(){dgt('5');},'d6'(){dgt('6');},'d7'(){dgt('7');},'d8'(){dgt('8');},'d9'(){dgt('9');},
  dot(){if(!isTyping){lift();inputStr='0';isTyping=true;}if(!inputStr.includes('.'))inputStr+='.';},
  eex(){if(!isTyping){lift();inputStr='1';isTyping=true;}if(!inputStr.includes('e'))inputStr+='e';},
  chs(){if(isTyping){inputStr=inputStr.startsWith('-')?inputStr.slice(1):'-'+inputStr;}else stack[0]=-stack[0];},
  pi(){pushX(Math.PI);},
  enter(){commit();const x=stack[0];lift();stack[0]=x;},
  rollDn(){commit();const x=stack[0];drop();stack[SZ-1]=x;},
  rollUp(){commit();const t=stack[SZ-1];for(let i=SZ-1;i>0;i--)stack[i]=stack[i-1];stack[0]=t;},
  swap(){commit();[stack[0],stack[1]]=[stack[1],stack[0]];},
  clx(){commit();stack[0]=0;},
  bksp(){if(isTyping){inputStr=inputStr.slice(0,-1);}else{drop();}},
  clearAll(){stack.fill(0);inputStr='';isTyping=false;},
  lastx(){pushX(lastX);},
  add(){B((y,x)=>y+x);},sub(){B((y,x)=>y-x);},mul(){B((y,x)=>y*x);},
  div(){B((y,x)=>{if(x===0){showErr('DIV BY 0');return NaN;}return y/x;});},
  mod(){B((y,x)=>{if(x===0){showErr('DIV BY 0');return NaN;}return y%x;});},
  sqrt(){U(x=>{if(x<0){showErr('DOMAIN');return NaN;}return Math.sqrt(x);});},
  sq(){U(x=>x*x);},
  expx(){U(x=>Math.exp(x));},
  ln(){U(x=>{if(x<=0){showErr('DOMAIN');return NaN;}return Math.log(x);});},
  pow10(){U(x=>Math.pow(10,x));},
  log(){U(x=>{if(x<=0){showErr('DOMAIN');return NaN;}return Math.log10(x);});},
  yx(){B((y,x)=>Math.pow(y,x));},
  xrty(){B((y,x)=>{if(x===0){showErr('DIV BY 0');return NaN;}return Math.pow(y,1/x);});},
  recip(){U(x=>{if(x===0){showErr('DIV BY 0');return NaN;}return 1/x;});},
  fact(){U(x=>{if(x<0||x!==Math.floor(x)){showErr('DOMAIN');return NaN;}if(x>170){showErr('OVERFLOW');return Infinity;}let r=1;for(let i=2;i<=x;i++)r*=i;return r;});},
  abs(){U(x=>Math.abs(x));},
  intg(){U(x=>Math.trunc(x));},
  frac(){U(x=>x-Math.trunc(x));},
  rnd(){U(x=>parseFloat(x.toPrecision(6)));},
  sin(){U(x=>Math.sin(toRad(x)));},
  cos(){U(x=>Math.cos(toRad(x)));},
  tan(){U(x=>Math.tan(toRad(x)));},
  asin(){U(x=>{if(Math.abs(x)>1){showErr('DOMAIN');return NaN;}return fromRad(Math.asin(x));});},
  acos(){U(x=>{if(Math.abs(x)>1){showErr('DOMAIN');return NaN;}return fromRad(Math.acos(x));});},
  atan(){U(x=>fromRad(Math.atan(x)));},
  sto(){commit();memory=stack[0];memUsed=true;},
  rcl(){commit();pushX(memory);},
  mplus(){commit();memory+=stack[0];memUsed=true;},
  mminus(){commit();memory-=stack[0];memUsed=true;},
  pct(){B((y,x)=>y*x/100);},
  dpct(){B((y,x)=>{if(y===0){showErr('DIV BY 0');return NaN;}return(x-y)/y*100;});},
};

function B(fn){commit();saveLast();const x=stack[0],y=stack[1];const r=fn(y,x);if(r!==undefined&&!isNaN(r)){drop();stack[0]=r;}}
function U(fn){commit();saveLast();const r=fn(stack[0]);if(r!==undefined&&!isNaN(r))stack[0]=r;}

// ═══════════════════════════════════════
// DISPATCH
// ═══════════════════════════════════════
function handleKey(k){
  clearErr();
  const isShift=(k.fn==='shiftF'||k.fn==='shiftG');
  let fn;
  if(shiftMode===1&&!isShift){fn=k.fFn||k.fn;shiftMode=0;}
  else if(shiftMode===2&&!isShift){fn=k.gFn||k.fn;shiftMode=0;}
  else fn=k.fn;
  if(fn&&A[fn])A[fn]();
  render();
}

// ═══════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════
document.addEventListener('keydown',e=>{
  const map={Enter:'enter',Backspace:'bksp',Escape:'clearAll',
    '+':'add','-':'sub','*':'mul','/':'div',
    '0':'d0','1':'d1','2':'d2','3':'d3','4':'d4',
    '5':'d5','6':'d6','7':'d7','8':'d8','9':'d9',
    '.':'dot','e':'eex','E':'eex','s':'sin','c':'cos',
    't':'tan','l':'ln','L':'log','p':'pi','q':'sqrt',
    'r':'rollDn','x':'swap','n':'chs','a':'abs',
  };
  if(map[e.key]){e.preventDefault();clearErr();if(A[map[e.key]]){A[map[e.key]]();render();}}
});

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
build();render();
</script>
